# SAS2008 card identity database — canonical source
#
# This file is the source of truth consumed by the `lsi-flash` CLI at build
# time. The CLI embeds it via `include_str!("../resources/card-database.toml")`
# after `cargo run --bin sync-card-db` copies it into the CLI source tree.
#
# Per ADR-014 (lsi-flash-notes/01-architecture/adr/014-sbr-verb-and-card-database.md):
#   - STRICT tier: only byte-confirmed identities (sample SBR, byte-diff RE,
#     real-hardware lspci capture, OR canonical pci.ids)
#   - User override path: ~/.config/lsi-flash/card-database.toml replaces this
#   - `lsi-flash update-manifest` fetches the latest version of this file
#
# Canonical pci.ids (pci-ids.ucw.cz/v2.2/pci.ids) is treated as byte-confirmed
# for the purposes of strict embed because:
#   1. The same file ships as /usr/share/hwdata/pci.ids in every Linux distro
#   2. lspci uses it to label Subsystem lines
#   3. Incorrect entries would be caught by any user running lspci over the
#      past decade — entries here have a decade of distributed verification
#
# Rumored / forum-only / un-byte-confirmed identities live in
# `card-database-tier2.toml` (separate file, manual opt-in via user override).
#
# Adding a new identity requires:
#   1. A sample SBR file in this repo (sas2008-<vendor>-<model>-*.sbr), OR
#   2. A byte-diff RE confirming SubsysVID/PID offsets across cohort, OR
#   3. A real-hardware lspci capture in 09-research-archive/fixtures/, OR
#   4. An entry in canonical pci.ids (https://pci-ids.ucw.cz/v2.2/pci.ids)

schema_version = 1
last_updated = "2026-05-18"
tier = "strict"

