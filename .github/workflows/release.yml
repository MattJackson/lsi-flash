name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-musl:
    name: build musl static binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      - name: install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - run: cargo build --release --target x86_64-unknown-linux-musl
      - name: package
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/lsi-flash dist/
          cp README.md LICENSE CHANGELOG.md dist/ 2>/dev/null || true
          cd dist
          tar -czf lsi-flash-${{ github.ref_name }}-x86_64-unknown-linux-musl.tar.gz *
          sha256sum lsi-flash-${{ github.ref_name }}-x86_64-unknown-linux-musl.tar.gz \
            > lsi-flash-${{ github.ref_name }}-x86_64-unknown-linux-musl.tar.gz.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/lsi-flash-*.tar.gz*

  publish:
    name: publish github release
    runs-on: ubuntu-latest
    needs: [build-musl]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v8
        with:
          name: release-artifacts
          path: dist
      - name: extract changelog section
        id: changelog
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            /^## \[/ { if (found) exit; if (index($0, "[" ver "]")) { found=1; next } }
            found
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "See CHANGELOG.md" > release-notes.md
          fi
      - uses: softprops/action-gh-release@v3
        with:
          body_path: release-notes.md
          files: dist/lsi-flash-*.tar.gz*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
